<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Swimology - 수상구조사 디지털 가이드</title>
    
    <!-- Libraries (Stable UMD) -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.419.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #003366;
            --accent: #FF6B00;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            word-break: keep-all;
            background-color: #f8fafc;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }

        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .active-tab { color: var(--primary); font-weight: 900; }
        .active-tab svg { stroke-width: 2.5px; }

        .hover-scale { transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .hover-scale:active { transform: scale(0.96); }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003366',
                        accent: '#FF6B00',
                    }
                }
            }
        }
    </script>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>

    <script>
        window.onload = function() {
            // Global React access
            const React = window.React;
            const ReactDOM = window.ReactDOM;
            const lucide = window.lucide;
            
            if (!React || !ReactDOM || !lucide) {
                console.error("Critical libraries failed to load.");
                return;
            }

            const { useState, useEffect, useRef } = React;
            const h = React.createElement;

            // --- Data Definitions ---
            const PDF_MAP = {
                1: "1g12Miv3kpzZwfrIszVcahMQhf1SUMhex",
                2: "1ccP2bT3th5jsylcXjL_RE3j3eY6uE5t5",
                3: "1umo0NfEW9mduNWI6R-v7EcI1QJOwiGK_",
                4: "1cXGmvysrfc8KvocL1OvRTiQE_gvi_Vaj",
                5: "1Uu8EidvtBalg8XzcrF3JoGAXQS-eZOEj",
                6: "1U7p1R9wbCAkE5UvagvOyNBDoW0JFVGzu",
                7: "18KzU7NsoFOdwfy0tMvVFJydR_aLlRoT5",
                unified: "1mkzmZOk_bri6n4ofAMoh6UIE3rOV-Ne1"
            };

            const getPdfUrl = (id) => `https://drive.google.com/uc?export=download&id=${PDF_MAP[id]}`;

            const VIDEO_CATEGORIES = [
                { cat: '1. 영법', items: [
                    { id: 'uhd5lBfGtIQ', title: '잠영', direct: 'https://youtu.be/T8-JDU3asO4', restricted: true },
                    { id: 'BVZqlqeizl8', title: '헤드업자유형', direct: 'https://youtu.be/vzYEJwYlyyI', restricted: true },
                    { id: 'nU0KJM2zt2M', title: '평영', direct: 'https://youtu.be/7zclcDIIqjw', restricted: true },
                    { id: 'geRgGxE4G2Y', title: '트러젠', direct: 'https://youtu.be/n3ozJnUocT4', restricted: true }
                ]},
                { cat: '2. 수영구조', items: [
                    { id: 'ZG_sgASjpPw', title: '수하구조', direct: 'https://youtu.be/ZG_sgASjpPw' },
                    { id: 'IS_VGt1AQdg', title: '앞목풀기', direct: 'https://youtu.be/IS_VGt1AQdg' },
                    { id: 'pzikd0au0go', title: '뒷목풀기', direct: 'https://youtu.be/pzikd0au0go' },
                    { id: 'DwePxEdp8E0', title: '손목풀기', direct: 'https://youtu.be/DwePxEdp8E0' }
                ]},
                { cat: '3. 장비구조', items: [
                    { id: 'H7v1m3pP5vE', title: '1급 장비구조', direct: 'https://youtu.be/H7v1m3pP5vE' },
                    { id: 'gWy5BYzfXns', title: '2급 장비구조', direct: 'https://youtube.com/shorts/gWy5BYzfXns' }
                ]},
                { cat: '4. 기본구조', items: [
                    { id: 'Ijojb_AWPsQ', title: '입영', direct: 'https://youtu.be/Ijojb_AWPsQ' },
                    { id: 'XVamBaSA4yM', title: '스컬링', direct: 'https://youtu.be/XVamBaSA4yM' }
                ]},
                { cat: '5. 종합구조', items: [
                    { id: 'mTnPTbbBvRs', title: '경추부상자구조', direct: 'https://youtu.be/mTnPTbbBvRs' },
                    { id: 'DOUWQ4dY93I', title: '요구조자 운반 (기본배영)', direct: 'https://youtu.be/DOUWQ4dY93I' },
                    { id: 'H8MM0yGnhYU', title: '요구조자 운반 (횡영)', direct: 'https://youtu.be/H8MM0yGnhYU' },
                    { id: 'DTeXB2ZigRQ', title: '구명동의 착용법', direct: 'https://youtu.be/14qhWxAkNbA', restricted: true },
                    { id: '4Fj9SPeKAfw', title: '퇴선방법', direct: 'https://youtu.be/CJ7MgH2XrJM', restricted: true },
                    { id: 'Djgx6m5spYM', title: '자동팽창식 구명뗏목 사용법', direct: 'https://youtu.be/JuZTSdfZA64', restricted: true },
                    { id: '5yey1aJ5BtA', title: '로프매듭법', direct: 'https://youtu.be/5yey1aJ5BtA' },
                    { id: '6PIg_D5dC5A', title: '스파인보드구조', direct: 'https://youtu.be/6PIg_D5dC5A' }
                ]},
                { cat: '6. 응급처치', items: [
                    { id: '77YoQFffKcs', title: '성인 심폐소생술', direct: 'https://youtu.be/erdZSV6G5X4', restricted: true },
                    { id: '1-tKW_5bdVs', title: '영아 심폐소생술', direct: 'https://youtu.be/SaKtSuf_JqI', restricted: true }
                ]}
            ];

            const CHAPTERS = [
                { id: 1, title: '수상구조사의 자세', color: 'bg-blue-50', icon: 'Heart' },
                { id: 2, title: '수난사고의 이해', color: 'bg-orange-50', icon: 'AlertTriangle' },
                { id: 3, title: '관련 법령 및 규정', color: 'bg-slate-50', icon: 'Scale' },
                { id: 4, title: '기본 응급처치', color: 'bg-red-50', icon: 'Zap' },
                { id: 5, title: '수상 구조 기술', color: 'bg-cyan-50', icon: 'LifeBuoy' },
                { id: 6, title: '지도자의 자질 및 역할', color: 'bg-purple-50', icon: 'UserCheck' },
                { id: 7, title: '생존수영 지도법', color: 'bg-emerald-50', icon: 'Waves' }
            ];

            // --- Icon Helper ---
            function Icon({ name, size = 20, className = "" }) {
                const iconRef = useRef(null);
                useEffect(() => {
                    if (iconRef.current && lucide.icons[name]) {
                        iconRef.current.innerHTML = '';
                        const svg = lucide.icons[name].toSvg({
                            width: size,
                            height: size,
                            class: className,
                            'stroke-width': 2
                        });
                        iconRef.current.innerHTML = svg;
                    }
                }, [name, size, className]);
                return h('span', { ref: iconRef, className: 'inline-flex items-center' });
            }

            // --- Root App ---
            function App() {
                const [tab, setTab] = useState('home');
                const [activeCat, setActiveCat] = useState(VIDEO_CATEGORIES[0].cat);

                return h('div', { className: 'max-w-2xl mx-auto flex flex-col min-h-screen pb-safe' },
                    // Header
                    h('header', { className: 'fixed top-0 left-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 py-3.5 px-6' },
                        h('div', { className: 'max-w-2xl mx-auto flex justify-between items-center' },
                            h('div', { className: 'flex items-center gap-2' },
                                h('div', { className: 'bg-primary p-1.5 rounded-lg' }, h(Icon, { name: 'ShieldCheck', size: 18, className: 'text-white' })),
                                h('span', { className: 'text-lg font-black tracking-tighter text-primary italic' }, 'SWIMOLOGY')
                            ),
                            h('a', { href: 'https://www.instagram.com/swimology__', target: '_blank', className: 'text-slate-400' }, h(Icon, { name: 'Instagram', size: 20 }))
                        )
                    ),

                    // Main Content
                    h('main', { className: 'flex-grow pt-20 pb-28 px-6' },
                        tab === 'home' && h(HomePage),
                        tab === 'theory' && h(TheoryPage),
                        tab === 'videos' && h(VideosPage, { activeCat, setActiveCat }),
                        tab === 'standards' && h(StandardsPage)
                    ),

                    // Bottom Navigation
                    h('nav', { className: 'fixed bottom-0 left-0 w-full z-[60] bg-white border-t border-slate-100 pb-safe shadow-2xl' },
                        h('div', { className: 'max-w-2xl mx-auto flex justify-around py-3' },
                            [
                                { id: 'home', label: '홈', icon: 'Home' },
                                { id: 'theory', label: '이론교육', icon: 'BookOpen' },
                                { id: 'videos', label: '실기영상', icon: 'Play' },
                                { id: 'standards', label: '평가기준', icon: 'FileText' }
                            ].map(t => h('button', {
                                key: t.id,
                                onClick: () => setTab(t.id),
                                className: `flex flex-col items-center gap-1 w-1/4 transition-colors ${tab === t.id ? 'active-tab' : 'text-slate-400 font-medium'}`
                            },
                                h(Icon, { name: t.icon, size: 22 }),
                                h('span', { className: 'text-[10px] uppercase tracking-wide' }, t.label)
                            ))
                        )
                    )
                );
            }

            // --- Home Page ---
            function HomePage() {
                return h('div', { className: 'fade-in' },
                    h('div', { className: 'py-8' },
                        h('h1', { className: 'text-4xl font-black italic tracking-tighter text-primary mb-3 leading-none' }, 'READY FOR', h('br'), h('span', { className: 'text-accent' }, 'RESCUE?')),
                        h('p', { className: 'text-slate-400 text-sm font-semibold' }, '수상구조사 국가자격 완벽 대비를 위한 공식 아카이브.')
                    ),
                    
                    h('div', { className: 'bg-white p-8 rounded-[2.5rem] shadow-xl shadow-slate-200 border border-slate-100 mb-8' },
                        h('div', { className: 'flex items-center gap-2 mb-4' },
                            h('div', { className: 'w-1.5 h-1.5 bg-accent rounded-full' }),
                            h('span', { className: 'text-[10px] font-bold text-accent tracking-[0.2em] uppercase' }, 'New Update')
                        ),
                        h('h2', { className: 'text-2xl font-black mb-6 text-slate-800' }, '수상구조사 문제은행', h('br'), '500문항 통합본 배포'),
                        h('a', { 
                            href: getPdfUrl('unified'), 
                            target: '_blank',
                            className: 'inline-flex items-center gap-2 bg-primary text-white px-8 py-4 rounded-2xl text-xs font-black hover-scale shadow-lg shadow-primary/20' 
                        }, h(Icon, { name: 'Download', size: 14 }), '통합 PDF 다운로드')
                    ),

                    h('a', { 
                        href: 'https://www.instagram.com/swimology__', 
                        target: '_blank',
                        className: 'flex items-center justify-between p-8 rounded-[2.5rem] bg-gradient-to-br from-[#f09433] via-[#dc2743] to-[#bc1888] text-white shadow-xl hover-scale mb-12' 
                    },
                        h('div', null,
                            h('p', { className: 'text-[9px] font-bold opacity-80 mb-1 tracking-widest' }, 'FOLLOW OUR INSTAGRAM'),
                            h('h3', { className: 'text-2xl font-black italic tracking-tighter' }, '@swimology__')
                        ),
                        h(Icon, { name: 'Instagram', size: 32 })
                    ),

                    h('footer', { className: 'py-10 flex flex-col items-center border-t border-slate-100 mt-8' },
                        h('div', { className: 'flex gap-6 mb-4' },
                            h('a', { href: 'https://youtube.com/@swimology_ist?si=zw1TEuQ0sBRiQPGI', target: '_blank', className: 'text-slate-300 hover:text-red-500 transition-colors' }, h(Icon, { name: 'Youtube', size: 24 })),
                            h('a', { href: 'https://www.instagram.com/swimology__', target: '_blank', className: 'text-slate-300 hover:text-pink-500 transition-colors' }, h(Icon, { name: 'Instagram', size: 24 }))
                        ),
                        h('p', { className: 'text-[10px] font-black text-slate-300 tracking-widest' }, '© 2024 SWIMOLOGY ARCHIVE')
                    )
                );
            }

            // --- Theory Page ---
            function TheoryPage() {
                return h('div', { className: 'fade-in' },
                    h('div', { className: 'py-6 mb-4' },
                        h('h2', { className: 'text-2xl font-black italic tracking-tighter mb-2 text-center' }, 'THEORY EDUCATION'),
                        h('p', { className: 'text-slate-400 text-xs font-bold text-center' }, '7개 장별 핵심 문제은행 가이드')
                    ),
                    h('div', { className: 'space-y-3.5' },
                        CHAPTERS.map(item => h('a', {
                            key: item.id,
                            href: getPdfUrl(item.id),
                            target: '_blank',
                            className: `flex items-center justify-between ${item.color} p-5 rounded-[2rem] border border-slate-100 hover-scale shadow-sm`
                        },
                            h('div', { className: 'flex items-center gap-4' },
                                h('div', { className: 'w-11 h-11 rounded-[1rem] bg-white flex items-center justify-center text-slate-900 shadow-sm' }, h(Icon, { name: item.icon, size: 22 })),
                                h('div', null,
                                    h('p', { className: 'text-[10px] font-bold text-slate-400 mb-0.5 tracking-wider' }, `CHAPTER 0${item.id}`),
                                    h('h4', { className: 'text-[15px] font-black text-slate-800' }, item.title)
                                )
                            ),
                            h(Icon, { name: 'ArrowDown', size: 18, className: 'text-slate-300' })
                        ))
                    )
                );
            }

            // --- Videos Page ---
            function VideosPage({ activeCat, setActiveCat }) {
                const currentData = VIDEO_CATEGORIES.find(v => v.cat === activeCat);

                return h('div', { className: 'fade-in' },
                    h('div', { className: 'py-6 mb-4 text-center' },
                        h('h2', { className: 'text-2xl font-black italic tracking-tighter mb-2' }, 'PRACTICAL GUIDE'),
                        h('p', { className: 'text-slate-400 text-xs font-bold' }, '수상구조사 실기 검정 주요 영법 및 기술')
                    ),
                    
                    // Category Navigation
                    h('div', { className: 'flex gap-2 overflow-x-auto no-scrollbar pb-6 sticky top-[52px] bg-slate-50/80 backdrop-blur-md z-40' },
                        VIDEO_CATEGORIES.map(c => h('button', {
                            key: c.cat,
                            onClick: () => setActiveCat(c.cat),
                            className: `whitespace-nowrap px-5 py-2.5 rounded-full text-xs font-black transition-all ${activeCat === c.cat ? 'bg-primary text-white shadow-lg shadow-primary/20' : 'bg-white text-slate-400 border border-slate-100 hover:border-slate-200'}`
                        }, c.cat.split('. ')[1]))
                    ),

                    // List
                    h('div', { className: 'space-y-12 mt-4' },
                        currentData.items.map((item, idx) => h('div', { key: idx, className: 'fade-in' },
                            h('div', { className: 'flex flex-col mb-4 px-1' },
                                h('div', { className: 'flex items-center justify-between mb-1' },
                                    h('h3', { className: 'text-xl font-black text-slate-900 italic underline decoration-primary decoration-4 underline-offset-4' }, item.title),
                                    h('a', { href: item.direct, target: '_blank', className: 'text-[10px] font-black text-primary bg-primary/5 px-2.5 py-1 rounded-full flex items-center gap-1.5' }, 
                                        h(Icon, { name: 'ExternalLink', size: 10 }), 'OFFICIAL'
                                    )
                                )
                            ),
                            h('div', { className: 'aspect-video rounded-[2.5rem] overflow-hidden bg-slate-200 shadow-2xl relative border-4 border-white' },
                                item.restricted ? 
                                    h('div', { className: 'absolute inset-0 bg-slate-900 flex flex-col items-center justify-center p-8 text-center' },
                                        h('div', { className: 'w-16 h-16 bg-red-600/20 rounded-full flex items-center justify-center mb-5' }, h(Icon, { name: 'AlertCircle', size: 32, className: 'text-red-500' })),
                                        h('p', { className: 'text-white text-lg font-black mb-2' }, '저작권 정책으로 인해', h('br'), 'YouTube에서만 가능합니다'),
                                        h('p', { className: 'text-slate-500 text-[11px] mb-8 font-medium' }, '정확한 학습을 위해 외부 앱으로 이동합니다.'),
                                        h('a', { 
                                            href: item.direct, 
                                            target: '_blank',
                                            className: 'bg-red-600 text-white px-10 py-4 rounded-2xl text-[12px] font-black uppercase tracking-widest shadow-xl shadow-red-600/40 active:scale-95 transition-all flex items-center gap-2'
                                        }, h(Icon, { name: 'Youtube', size: 16 }), 'YouTube에서 보기')
                                    )
                                : h('iframe', {
                                    src: `https://www.youtube.com/embed/${item.id}`,
                                    className: 'w-full h-full',
                                    frameBorder: '0',
                                    allow: 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture',
                                    allowFullScreen: true
                                })
                            )
                        ))
                    )
                );
            }

            // --- Standards Page ---
            function StandardsPage() {
                const rules = [
                    { t: '종목별 합산', d: '전 종목 총점 100점 중 60점 이상 득점 시 합격 (단, 한 과목이라도 0점 처리 시 불합격)' },
                    { t: '영법 평가', d: '지정된 제한 시간 내에 완주해야 하며, 바닥을 딛거나 레인을 잡을 시 실격 처리됩니다.' },
                    { t: '운반 기술', d: '구조 대상자의 안면이 수면 아래로 침수되지 않도록 유지하는 것이 가장 중요한 평가 요소입니다.' },
                    { t: '장비 구조', d: '레스큐 튜브를 정확히 수평 투척하고 익수자에게 정확히 도달하게 하는 것이 핵심입니다.' }
                ];

                return h('div', { className: 'fade-in' },
                    h('div', { className: 'py-6 mb-8 text-center' },
                        h('h2', { className: 'text-2xl font-black italic tracking-tighter mb-2' }, 'ASSESSMENT RULES'),
                        h('p', { className: 'text-slate-400 text-xs font-bold' }, '수상구조사 국가자격 시험 합격 가이드')
                    ),
                    
                    h('div', { className: 'space-y-4' },
                        rules.map((r, i) => h('div', { key: i, className: 'bg-white p-7 rounded-[2rem] border border-slate-100 flex gap-5 shadow-sm' },
                            h('div', { className: 'w-12 h-12 rounded-2xl bg-primary/5 flex items-center justify-center text-primary font-black italic text-xl shrink-0' }, i + 1),
                            h('div', { className: 'flex flex-col justify-center' },
                                h('h4', { className: 'font-black text-slate-900 mb-1' }, r.t),
                                h('p', { className: 'text-xs text-slate-500 leading-relaxed font-medium' }, r.d)
                            )
                        ))
                    ),

                    h('div', { className: 'mt-12 bg-primary rounded-[3rem] p-12 text-center shadow-2xl shadow-primary/30' },
                         h('div', { className: 'inline-flex p-3 bg-white/10 rounded-2xl mb-6' }, h(Icon, { name: 'ExternalLink', size: 24, className: 'text-white' })),
                         h('h3', { className: 'text-white text-2xl font-black mb-8 italic tracking-tighter' }, 'OFFICIAL PORTAL'),
                         h('p', { className: 'text-blue-100/60 text-xs mb-8 leading-relaxed font-medium' }, '자세한 일정 및 시험 접수는 해양경찰청', h('br'), '수상구조사 종합정보시스템을 확인하세요.'),
                         h('a', { 
                            href: 'https://imsm.kcg.go.kr/CLMS/', 
                            target: '_blank',
                            className: 'inline-block bg-accent text-white px-10 py-4 rounded-2xl text-xs font-black shadow-lg shadow-black/20 hover-scale' 
                         }, '공식 접수처 바로가기')
                    )
                );
            }

            // --- Root Rendering ---
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(h(App));
        };
    </script>
</body>
</html>
