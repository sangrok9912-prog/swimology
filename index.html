<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Swimology - @swimology__</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #003366;
            --accent: #FF6B00;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #f8fafc;
            color: #0f172a;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }

        .active-tab { color: var(--primary); font-weight: 800; }
        
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .btn-active:active { transform: scale(0.96); }
        
        /* Table Styles */
        .standard-table { width: 100%; border-collapse: separate; border-spacing: 0; border-radius: 1rem; overflow: hidden; }
        .standard-table th { background-color: #f1f5f9; font-weight: 800; font-size: 11px; padding: 12px 8px; text-align: center; color: #475569; }
        .standard-table td { background-color: white; font-size: 11px; padding: 12px 8px; text-align: center; border-top: 1px solid #f1f5f9; color: #1e293b; font-weight: 600; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003366',
                        accent: '#FF6B00',
                    }
                }
            }
        }
    </script>
</head>
<body class="overflow-x-hidden">

    <div id="app" class="max-w-2xl mx-auto flex flex-col min-h-screen">
        <!-- Header -->
        <header class="fixed top-0 left-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 py-3.5 px-6">
            <div class="max-w-2xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="p-1.5 rounded-lg">
                        <i data-lucide="life-buoy" class="w-4 h-4 text-primary"></i>
                    </div>
                    <span class="text-lg font-black tracking-tighter text-primary italic">SWIMOLOGY</span>
                </div>
                <a href="https://www.instagram.com/swimology__" target="_blank" class="text-slate-400 hover:text-pink-500 transition-colors">
                    <i data-lucide="instagram" class="w-5 h-5"></i>
                </a>
            </div>
        </header>

        <!-- Main Content (Dynamic) -->
        <main id="content" class="flex-grow pt-20 pb-28 px-6">
            <!-- Content will be injected here -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 w-full z-[60] bg-white border-t border-slate-100 pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.03)]">
            <div class="max-w-2xl mx-auto flex justify-around py-3">
                <button onclick="navigate('home')" id="nav-home" class="nav-item flex flex-col items-center gap-1 w-1/4 transition-all text-slate-400">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold uppercase tracking-wider">홈</span>
                </button>
                <button onclick="navigate('theory')" id="nav-theory" class="nav-item flex flex-col items-center gap-1 w-1/4 transition-all text-slate-400">
                    <i data-lucide="book-open" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold uppercase tracking-wider">이론교육</span>
                </button>
                <button onclick="navigate('videos')" id="nav-videos" class="nav-item flex flex-col items-center gap-1 w-1/4 transition-all text-slate-400">
                    <i data-lucide="play" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold uppercase tracking-wider">실기영상</span>
                </button>
                <button onclick="navigate('standards')" id="nav-standards" class="nav-item flex flex-col items-center gap-1 w-1/4 transition-all text-slate-400">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold uppercase tracking-wider">평가기준</span>
                </button>
            </div>
        </nav>
    </div>

                { id: 'XVamBaSA4yM', title: '스컬링', direct: 'https://youtu.be/XVamBaSA4yM', thumb: 'https://img.youtube.com/vi/XVamBaSA4yM/mqdefault.jpg', hideYoutubeBtn: true }
            ]},
            { cat: '종합구조', items: [

                { id: 'DOUWQ4dY93I', title: '요구조자 운반 (배영)', direct: 'https://youtu.be/DOUWQ4dY93I', thumb: 'https://img.youtube.com/vi/DOUWQ4dY93I/mqdefault.jpg', hideYoutubeBtn: true },
                { id: 'H8MM0yGnhYU', title: '요구조자 운반 (횡영)', direct: 'https://youtu.be/H8MM0yGnhYU', thumb: 'https://img.youtube.com/vi/H8MM0yGnhYU/mqdefault.jpg', hideYoutubeBtn: true },

        const CHAPTERS = [
            { id: 1, title: '수상구조사의 자세', icon: 'heart', color: 'bg-blue-50' },
            { id: 2, title: '조난사고의 이해', icon: 'alert-triangle', color: 'bg-orange-50' },
            { id: 3, title: '관련법령', icon: 'scale', color: 'bg-slate-50' },
            { id: 4, title: '응급처치', icon: 'zap', color: 'bg-red-50' },
            { id: 5, title: '구조기술', icon: 'life-buoy', color: 'bg-cyan-50' },
            { id: 6, title: '지도자의 자질', icon: 'user-check', color: 'bg-purple-50' },
            { id: 7, title: '생존수영', icon: 'waves', color: 'bg-emerald-50' }
        ];

        // --- State ---
        let currentTab = 'home';
        let currentVideoCat = '영법';

        // --- Navigation Logic ---
        function navigate(tab) {
            currentTab = tab;
            render();
            window.scrollTo(0, 0);
        }

        function setVideoCat(cat) {
            currentVideoCat = cat;
            renderVideos();
        }

        function getPdfUrl(id) {
            return `https://drive.google.com/uc?export=download&id=${PDF_DATA[id]}`;
        }

        // --- Rendering ---
        function render() {
            const content = document.getElementById('content');
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(item => {
                if (item.id === `nav-${currentTab}`) {
                    item.classList.add('active-tab');
                    item.classList.remove('text-slate-400');
                } else {
                    item.classList.remove('active-tab');
                    item.classList.add('text-slate-400');
                }
            });

            content.innerHTML = '';
            switch(currentTab) {
                case 'home': renderHome(); break;
                case 'theory': renderTheory(); break;
                case 'videos': renderVideos(); break;
                case 'standards': renderStandards(); break;
            }
            
            lucide.createIcons();
        }

        function renderHome() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="fade-in">
                    <div class="py-6">
                        <h1 class="text-4xl font-black italic tracking-tighter text-primary leading-tight mb-2">
                            SWIMOLOGY<br><span class="text-accent underline decoration-4 underline-offset-4 uppercase">EDUCATION</span>
                        </h1>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div onclick="navigate('theory')" class="bg-blue-50 p-6 rounded-[2rem] border border-blue-100 btn-active cursor-pointer h-full">

                            <h3 class="font-black text-[13px] text-slate-800 leading-tight">

                            </h3>
                        </div>

                            <h3 class="font-black text-[13px] text-slate-800 leading-tight">
                                실기 영상<br>
                                <span class="opacity-60 text-[11px] font-bold">가이드북</span>
                            </h3>
                        </div>

                        <div>
                            <p class="text-[9px] font-bold opacity-80 mb-1 tracking-widest uppercase">Follow Instagram</p>
                            <h3 class="text-2xl font-black italic tracking-tighter">@swimology__</h3>
                        </div>
                        <i data-lucide="instagram" class="w-8 h-8"></i>
                    </a>

                    <a href="https://imsm.kcg.go.kr/CLMS/" target="_blank" class="w-full bg-slate-900 text-white rounded-2xl py-4 flex items-center justify-center gap-2 font-bold text-sm btn-active mb-12 shadow-lg">
                        <i data-lucide="external-link" class="w-4 h-4 text-accent"></i>
                        수상구조사 종합정보 홈페이지 바로가기
                    </a>

                    <footer class="py-10 flex flex-col items-center border-t border-slate-100 gap-4 mt-4">
                        <div class="flex gap-8 opacity-30">
                            <a href="https://youtube.com/@swimology_ist?si=zw1TEuQ0sBRiQPGI" target="_blank"><i data-lucide="youtube" class="w-6 h-6"></i></a>

        function renderTheory() {

            const categories = VIDEO_DATA.map(v => v.cat);

                                        <th>2급</th>

                                        <td>제한시간 초과 시 -15</td>

                                        <td>5분 이상</td>
                                        <td>2분 이상</td>

                                    </tr>
                                    <tr>

                                        <td>25m (5kg)</td>

                                        <td>중량물 유실 시 실격</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <p class="text-[10px] text-slate-400 mt-3 font-semibold px-2">※ 전 종목 총점 100점 만점에 60점 이상 획득 시 합격 (0점 과목 발생 시 불합격)</p>
                    </div>
