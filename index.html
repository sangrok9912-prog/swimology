    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0A1F44;
            --accent: #D97706;
        }
        
        body {
            font-family: 'Noto Sans KR', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #f8fafc;
            color: #0f172a;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }

        .active-tab { color: var(--primary); font-weight: 800; }
        
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .btn-active:active { transform: scale(0.96); }
        
        /* Premium Table Styles */
        .standard-table { width: 100%; border-collapse: separate; border-spacing: 0; border-radius: 1rem; overflow: hidden; }
        .standard-table th { 
            background-color: #f1f5f9; 
            font-weight: 800; 
            font-size: 11px; 
            padding: 16px 8px; 
            text-align: center; 
            color: #475569; 
            border-bottom: 1px solid #e2e8f0; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .standard-table td { 
            background-color: white; 
            font-size: 11px; 
            padding: 16px 8px; 
            text-align: center; 
            border-bottom: 1px solid #f1f5f9; 
            color: #1e293b; 
            font-weight: 600; 
        }
        .standard-table tr:last-child td { border-bottom: none; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0A1F44',
                        accent: '#D97706',
                    }
                }
            }
        }
    </script>
</head>

            const content = document.getElementById('content');
            const navItems = document.querySelectorAll('.nav-item');

                    item.classList.add('active-tab');
                    item.classList.remove('text-slate-400');
                } else {
                    item.classList.remove('active-tab');
                    item.classList.add('text-slate-400');
                }
            });

            content.innerHTML = '';
            switch(currentTab) {
                case 'home': renderHome(); break;
                case 'theory': renderTheory(); break;
                case 'videos': renderVideos(); break;
                case 'standards': renderStandards(); break;
            }
            lucide.createIcons();
        }
