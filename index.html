<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swimology 실기 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto+Sans+KR', sans-serif; word-break: keep-all; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="px-4 py-4 flex justify-between items-center max-w-md mx-auto">
            <h1 class="text-xl font-bold text-blue-600">@swimology__</h1>
            <a href="https://www.instagram.com/swimology__" target="_blank" class="text-pink-500 text-2xl"><i class="fab fa-instagram"></i></a>
        </div>
        <div class="flex overflow-x-auto hide-scrollbar px-4 pb-2 space-x-4 max-w-md mx-auto text-sm font-medium text-gray-500">
            <button class="whitespace-nowrap text-blue-600 border-b-2 border-blue-600 pb-1">영법</button>
            <button class="whitespace-nowrap">수영구조</button>
            <button class="whitespace-nowrap">장비구조</button>
            <button class="whitespace-nowrap">기본구조</button>
            <button class="whitespace-nowrap">종합구조</button>
            <button class="whitespace-nowrap">응급처치</button>
            <button class="whitespace-nowrap">로프매듭</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24">
        <p class="text-sm text-gray-500 mb-6 text-center">💡 영상이 로딩되지 않으면 아래 버튼을 눌러주세요.</p>

        <section class="mb-10">
            <h2 class="text-lg font-bold mb-4 flex items-center"><i class="fas fa-swimmer mr-2 text-blue-500"></i> 1. 영법</h2>
            
            <div class="bg-white rounded-2xl shadow-sm p-4 mb-6">
                <h3 class="font-bold mb-3 text-gray-800">잠영</h3>
                <div class="video-container mb-3">
                    <iframe src="https://www.youtube.com/embed/uhd5lBfGtIQ"></iframe>
                </div>
                <a href="https://youtu.be/T8-JDU3asO4" target="_blank" class="w-full flex items-center justify-center bg-gray-100 py-3 rounded-xl text-sm font-bold text-gray-700 hover:bg-gray-200 transition">
                    <i class="fab fa-youtube text-red-500 mr-2"></i> 공식 채널에서 직접 보기
                </a>
            </div>

            <div class="bg-white rounded-2xl shadow-sm p-4 mb-6">
                <h3 class="font-bold mb-3 text-gray-800">머리 들고 자유형</h3>
                <div class="video-container mb-3">
                    <iframe src="https://www.youtube.com/embed/BVZqlqeizl8"></iframe>
                </div>
                <a href="https://youtu.be/vzYEJwYlyyI" target="_blank" class="w-full flex items-center justify-center bg-gray-100 py-3 rounded-xl text-sm font-bold text-gray-700">
                    <i class="fab fa-youtube text-red-500 mr-2"></i> 공식 채널에서 직접 보기
                </a>
            </div>

            <div class="bg-white rounded-2xl shadow-sm p-4 mb-6">
                <h3 class="font-bold mb-3 text-gray-800">평영</h3>
                <div class="video-container mb-3">
                    <iframe src="https://www.youtube.com/embed/nU0KJM2zt2M"></iframe>
                </div>
                <a href="https://youtu.be/7zclcDIIqjw" target="_blank" class="w-full flex items-center justify-center bg-gray-100 py-3 rounded-xl text-sm font-bold text-gray-700">
                    <i class="fab fa-youtube text-red-500 mr-2"></i> 공식 채널에서 직접 보기
                </a>
            </div>
        </section>

        <section class="mb-10">
            <h2 class="text-lg font-bold mb-4 flex items-center"><i class="fas fa-first-aid mr-2 text-red-500"></i> 6. 응급처치</h2>
            
            <div class="bg-white rounded-2xl shadow-sm p-4 mb-6">
                <h3 class="font-bold mb-3 text-gray-800">성인 심폐소생술</h3>
                <div class="video-container mb-3">
                    <iframe src="https://www.youtube.com/embed/77YoQFffKcs"></iframe>
                </div>
                <a href="https://youtu.be/erdZSV6G5X4" target="_blank" class="w-full flex items-center justify-center bg-gray-100 py-3 rounded-xl text-sm font-bold text-gray-700">
                    <i class="fab fa-youtube text-red-500 mr-2"></i> 공식 채널에서 직접 보기
                </a>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t px-6 py-3 flex justify-between items-center max-w-md mx-auto z-50">
        <div class="flex flex-col items-center text-gray-400">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] mt-1">홈</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i class="fas fa-book text-xl"></i>
            <span class="text-[10px] mt-1">이론교육</span>
        </div>
        <div class="flex flex-col items-center text-blue-600">
            <i class="fas fa-play-circle text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">실기영상</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i class="fas fa-check-double text-xl"></i>
            <span class="text-[10px] mt-1">평가기준</span>
        </div>
    </nav>

</body>
</html>
