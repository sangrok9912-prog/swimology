                    {playing && (
                        <div className="fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-4 transition-opacity duration-300" onClick={() => setPlaying(null)}>
                            <div className="w-full max-w-4xl bg-slate-900 rounded-[2.5rem] overflow-hidden shadow-2xl scale-in" onClick={e => e.stopPropagation()}>
                                <div className="aspect-video relative"><iframe className="w-full h-full" src={`https://www.youtube.com/embed/${playing.id}?autoplay=1`} frameBorder="0" allowFullScreen></iframe></div>
                                <div className="p-8 text-white"><h3 className="text-xl font-black italic">{playing.title}</h3><p className="text-sm text-slate-400 mt-2">{playing.description}</p></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const HomeView = ({ setPage }) => (
            <div className="flex flex-col">
                <section className="bg-slate-900 pt-16 pb-12 px-8 relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-64 h-64 bg-primary/20 rounded-full -mr-32 -mt-16 blur-3xl"></div>
                    <div className="relative z-10"><h1 className="text-4xl font-black text-white leading-tight italic tracking-tighter">SWIMOLOGY<br/><span className="text-[#0055A4]">EDUCATION</span></h1></div>
                </section>
                <section className="px-6 -mt-8 z-10 grid grid-cols-2 gap-4">
                    <button onClick={() => setPage('theory')} className="bg-white p-6 rounded-3xl shadow-xl border border-slate-100 text-left active:scale-95 transition-all">
                        <div className="w-10 h-10 bg-orange-50 text-accent rounded-2xl mb-4 flex items-center justify-center"><Icons.BookOpen size={20}/></div>
                        <h3 className="text-sm font-black text-slate-800 leading-tight uppercase">이론교육<br/>문제은행</h3>
                    </button>
                    <button onClick={() => setPage('videos')} className="bg-white p-6 rounded-3xl shadow-xl border border-slate-100 text-left active:scale-95 transition-all">
                        <div className="w-10 h-10 bg-blue-50 text-primary rounded-2xl mb-4 flex items-center justify-center"><Icons.PlayCircle size={20}/></div>
                        <h3 className="text-sm font-black text-slate-800 leading-tight uppercase">실기영상<br/>가이드북</h3>
                    </button>
                </section>
                <section className="p-6 space-y-6">
                    <a href={PORTAL_CONFIG.links.instagram} target="_blank" className="bg-gradient-to-br from-purple-600 via-pink-500 to-orange-500 p-8 rounded-[3rem] text-white flex items-center justify-between shadow-2xl active:scale-95 transition-all">
                        <div><div className="flex items-center gap-2 mb-2"><Icons.Instagram size={20}/><span className="text-[10px] font-black uppercase tracking-widest">Official Instagram</span></div><h3 className="text-2xl font-black italic tracking-tighter">@swimology__</h3></div>
                        <Icons.ArrowRight size={24}/>
                    </a>
                    <div className="bg-slate-900 rounded-[3rem] p-10 text-center shadow-xl">
                        <h3 className="text-2xl font-black text-white mb-6 italic tracking-tighter">해양경찰청<br/>수상구조사 종합정보</h3>
                        <a href={PORTAL_CONFIG.links.portal} target="_blank" className="bg-white text-slate-900 px-8 py-4 rounded-2xl font-black text-sm inline-flex items-center gap-2 shadow-xl">바로가기 <Icons.ExternalLink size={16}/></a>
                    </div>
                </section>
            </div>
        );

        const TheoryView = ({ tab, setTab, handleDownload, dl }) => {
            const data = CURRICULUM_DATA.find(c => c.id === tab);
            const [exp, setExp] = useState(null);
            return (
                <div className="p-6 space-y-8">
                    <h2 className="text-2xl font-black text-slate-900 italic tracking-tighter uppercase">이론교육 문제은행</h2>
                    <div className="flex bg-slate-100 p-1 rounded-2xl">
                        {CURRICULUM_DATA.map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} className={`flex-1 py-3 rounded-xl text-xs font-black transition-all ${tab === t.id ? 'bg-white shadow-sm text-primary' : 'text-slate-400'}`}>{t.name.split(' ')[0]}</button>
                        ))}
                    </div>
                    <div className="bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl">
                        <h4 className="text-sm font-black text-accent uppercase mb-6">통합 문제은행</h4>
                        <div className="space-y-4">
                            {QUESTION_BANK_DATA.map(qb => (
                                <div key={qb.id} className="bg-white/5 rounded-2xl border border-white/10">
                                    <button onClick={() => setExp(exp === qb.id ? null : qb.id)} className="w-full p-5 flex items-center justify-between text-left">
                                        <div><span className="text-white font-bold text-sm">{qb.chapter}장 {qb.title}</span><p className="text-[9px] text-slate-500 font-bold mt-1 uppercase">{qb.range} • {qb.totalQuestions}문항</p></div>
                                        <Icons.ChevronDown size={18} className={`text-slate-500 transition-transform ${exp === qb.id ? 'rotate-180 text-white' : ''}`}/>
                                    </button>
                                    {exp === qb.id && (
                                        <div className="px-5 pb-5 overflow-hidden animate-slide-down">
                                            <button onClick={() => handleDownload(qb.chapter, `chapter_${qb.chapter}.pdf`)} className="w-full bg-white/10 py-3 rounded-xl text-white text-xs font-black flex items-center justify-center gap-2 hover:bg-white/20 active:scale-95 transition-all">
                                                {dl === `chapter_${qb.chapter}.pdf` ? <Icons.Clock size={14} className="animate-spin"/> : < Icons.Download size={14}/>} PDF 다운로드
                                            </button>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                        <button onClick={() => handleDownload('unified', 'bank_500.pdf')} className="w-full mt-6 bg-accent py-5 rounded-2xl text-white font-black text-sm flex items-center justify-center gap-3">
                            <Icons.Download size={20}/> 문제은행 PDF (500문항)
                        </button>
                    </div>
                    <div className="bg-primary p-8 rounded-[2.5rem] text-white">
                        <h3 className="text-2xl font-black italic mb-2">{data.name}</h3>
                        <p className="text-blue-100/80 text-xs font-light">{data.summary}</p>
                    </div>
                </div>
            );
        };

        const VideosView = ({ setPlaying }) => (
            <div className="p-6">
                <h2 className="text-2xl font-black italic uppercase text-center mb-10">실기영상 아카이브</h2>
                <div className="space-y-8">
                    {VIDEO_CATEGORIES.map(cat => (
                        <div key={cat.id}>
                            <h4 className="text-sm font-black text-slate-400 uppercase mb-4 pl-2">{cat.name}</h4>
                            <div className="grid grid-cols-1 gap-4">
                                {cat.items.filter(i => i.type === 'embed').map((v, i) => (
                                    <div key={i} onClick={() => setPlaying(v)} className="bg-white rounded-[2rem] border border-slate-100 shadow-lg overflow-hidden cursor-pointer group">
                                        <div className="aspect-video relative"><img src={`https://img.youtube.com/vi/${v.id}/hqdefault.jpg`} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                            <div className="absolute inset-0 bg-black/20 flex items-center justify-center"><Icons.PlayCircle size={40} className="text-white"/></div></div>
                                        <div className="p-5 flex justify-between items-center"><h5 className="font-black italic text-slate-800 text-sm">{v.title}</h5><Icons.ChevronRight size={16} className="text-slate-300"/></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const StandardsView = () => {
            const [exp, setExp] = useState(null);
            return (
                <div className="p-6">
                    <h2 className="text-2xl font-black italic uppercase text-center mb-10 underline decoration-accent decoration-4 underline-offset-8">실기 평가 세부 기준</h2>
                    <div className="space-y-4">
                        {FULL_STANDARDS_DATA.map((s, i) => (
                            <div key={i} className="bg-white rounded-3xl border border-slate-100 shadow-lg overflow-hidden">
                                <button onClick={() => setExp(exp === i ? null : i)} className="w-full p-6 flex justify-between items-center text-left">
                                    <h4 className="font-black italic text-slate-800">{s.category}</h4>
                                    <Icons.ChevronDown size={18} className={`transition-transform duration-300 ${exp === i ? 'rotate-180 text-accent' : ''}`}/>
                                </button>
                                {exp === i && <div className="px-6 pb-6 overflow-hidden animate-slide-down">
                                    <div className="border-t border-slate-50 pt-4"><p className="text-[11px] text-slate-600 mb-4">{s.description}</p>
                                    <div className="bg-slate-50 rounded-2xl p-4 overflow-x-auto"><table className="w-full text-left text-[10px] font-bold">
                                        <tr className="border-b border-slate-200"><th className="pb-2">항목</th><th className="pb-2">1급</th><th className="pb-2">2급</th></tr>
                                        {s.items.map((it, idx) => (<tr key={idx}><td className="py-2">{it.item}</td><td className="py-2 text-primary">{it.class1}</td><td className="py-2 text-accent">{it.class2}</td></tr>))}
                                    </table></div></div>
                                </div>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
