<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Swimology - @swimology__</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #003366;
            --accent: #FF6B00;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #f8fafc;
            color: #0f172a;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }

        .active-tab { color: var(--primary); font-weight: 800; }
        
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .tab-btn.active {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 51, 102, 0.2);
        }

        .video-card:active { transform: scale(0.98); }
        .btn-active:active { transform: scale(0.96); }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003366',
                        accent: '#FF6B00',
                    }
                }
            }
        }
    </script>
</head>
<body class="overflow-x-hidden">

    <div id="app" class="max-w-2xl mx-auto flex flex-col min-h-screen">
        <!-- Header -->
        <header class="fixed top-0 left-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 py-3.5 px-6">
            <div class="max-w-2xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-primary p-1.5 rounded-lg">
                        <i data-lucide="shield-check" class="w-4 h-4 text-white"></i>
                    </div>
                    <span class="text-lg font-black tracking-tighter text-primary italic">SWIMOLOGY</span>
                </div>
                <a href="https://www.instagram.com/swimology__" target="_blank" class="text-slate-400 hover:text-pink-500 transition-colors">
                    <i data-lucide="instagram" class="w-5 h-5"></i>
                </a>
            </div>
        </header>

        <!-- Main Content (Dynamic) -->
        <main id="content" class="flex-grow pt-20 pb-28 px-6">
            <!-- Content will be injected here -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 w-full z-[60] bg-white border-t border-slate-100 pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.03)]">
            <div class="max-w-2xl mx-auto flex justify-around py-3">
                <button onclick="navigate('home')" id="nav-home" class="nav-item flex flex-col items-center gap-1 w-1/4 transition-all text-slate-400">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold uppercase tracking-wider">홈</span>
                </button>
                <button onclick="navigate('theory')" id="nav-theory" class="nav-item flex flex-col items-center gap-1 w-1/4 transition-all text-slate-400">
                    <i data-lucide="book-open" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold uppercase tracking-wider">이론</span>
                </button>
                <button onclick="navigate('videos')" id="nav-videos" class="nav-item flex flex-col items-center gap-1 w-1/4 transition-all text-slate-400">
                    <i data-lucide="play" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold uppercase tracking-wider">실기</span>
                </button>
                <button onclick="navigate('standards')" id="nav-standards" class="nav-item flex flex-col items-center gap-1 w-1/4 transition-all text-slate-400">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold uppercase tracking-wider">기준</span>
                </button>
            </div>
        </nav>
    </div>

    <script>
        // --- Data ---
        const PDF_DATA = {
            1: "1g12Miv3kpzZwfrIszVcahMQhf1SUMhex",
            2: "1ccP2bT3th5jsylcXjL_RE3j3eY6uE5t5",
            3: "1umo0NfEW9mduNWI6R-v7EcI1QJOwiGK_",
            4: "1cXGmvysrfc8KvocL1OvRTiQE_gvi_Vaj",
            5: "1Uu8EidvtBalg8XzcrF3JoGAXQS-eZOEj",
            6: "1U7p1R9wbCAkE5UvagvOyNBDoW0JFVGzu",
            7: "18KzU7NsoFOdwfy0tMvVFJydR_aLlRoT5",
            unified: "1mkzmZOk_bri6n4ofAMoh6UIE3rOV-Ne1"
        };

        const VIDEO_DATA = [
            { cat: '영법', items: [
                { id: 'uhd5lBfGtIQ', title: '잠영', direct: 'https://youtu.be/T8-JDU3asO4', thumb: 'https://img.youtube.com/vi/uhd5lBfGtIQ/mqdefault.jpg' },
                { id: 'BVZqlqeizl8', title: '헤드업자유형', direct: 'https://youtu.be/vzYEJwYlyyI', thumb: 'https://img.youtube.com/vi/BVZqlqeizl8/mqdefault.jpg' },
                { id: 'nU0KJM2zt2M', title: '평영', direct: 'https://youtu.be/7zclcDIIqjw', thumb: 'https://img.youtube.com/vi/nU0KJM2zt2M/mqdefault.jpg' },
                { id: 'geRgGxE4G2Y', title: '트러젠', direct: 'https://youtu.be/n3ozJnUocT4', thumb: 'https://img.youtube.com/vi/geRgGxE4G2Y/mqdefault.jpg' }
            ]},
            { cat: '수영구조', items: [
                { id: 'ZG_sgASjpPw', title: '수하구조', direct: 'https://youtu.be/ZG_sgASjpPw', thumb: 'https://img.youtube.com/vi/ZG_sgASjpPw/mqdefault.jpg' },
                { id: 'IS_VGt1AQdg', title: '앞목풀기', direct: 'https://youtu.be/IS_VGt1AQdg', thumb: 'https://img.youtube.com/vi/IS_VGt1AQdg/mqdefault.jpg' },
                { id: 'pzikd0au0go', title: '뒷목풀기', direct: 'https://youtu.be/pzikd0au0go', thumb: 'https://img.youtube.com/vi/pzikd0au0go/mqdefault.jpg' }
            ]},
            { cat: '종합구조', items: [
                { id: 'mTnPTbbBvRs', title: '경추부상자구조', direct: 'https://youtu.be/mTnPTbbBvRs', thumb: 'https://img.youtube.com/vi/mTnPTbbBvRs/mqdefault.jpg' },
                { id: 'DOUWQ4dY93I', title: '요구조자 운반 (배영)', direct: 'https://youtu.be/DOUWQ4dY93I', thumb: 'https://img.youtube.com/vi/DOUWQ4dY93I/mqdefault.jpg' },
                { id: 'H8MM0yGnhYU', title: '요구조자 운반 (횡영)', direct: 'https://youtu.be/H8MM0yGnhYU', thumb: 'https://img.youtube.com/vi/H8MM0yGnhYU/mqdefault.jpg' },
                { id: '5yey1aJ5BtA', title: '로프매듭법', direct: 'https://youtu.be/5yey1aJ5BtA', thumb: 'https://img.youtube.com/vi/5yey1aJ5BtA/mqdefault.jpg' }
            ]},
            { cat: '응급처치', items: [
                { id: '77YoQFffKcs', title: '성인 CPR', direct: 'https://youtu.be/erdZSV6G5X4', thumb: 'https://img.youtube.com/vi/77YoQFffKcs/mqdefault.jpg' },
                { id: '1-tKW_5bdVs', title: '영아 CPR', direct: 'https://youtu.be/SaKtSuf_JqI', thumb: 'https://img.youtube.com/vi/1-tKW_5bdVs/mqdefault.jpg' }
            ]}
        ];

        const CHAPTERS = [
            { id: 1, title: '수상구조사의 자세', icon: 'heart', color: 'bg-blue-50' },
            { id: 2, title: '수난사고의 이해', icon: 'alert-triangle', color: 'bg-orange-50' },
            { id: 3, title: '관련 법령 및 규정', icon: 'scale', color: 'bg-slate-50' },
            { id: 4, title: '기본 응급처치', icon: 'zap', color: 'bg-red-50' },
            { id: 5, title: '수상 구조 기술', icon: 'life-buoy', color: 'bg-cyan-50' },
            { id: 6, title: '지도자의 자질', icon: 'user-check', color: 'bg-purple-50' },
            { id: 7, title: '생존수영 지도법', icon: 'waves', color: 'bg-emerald-50' }
        ];

        // --- State ---
        let currentTab = 'home';
        let currentVideoCat = '영법';

        // --- Navigation Logic ---
        function navigate(tab) {
            currentTab = tab;
            render();
            window.scrollTo(0, 0);
        }

        function setVideoCat(cat) {
            currentVideoCat = cat;
            renderVideos();
        }

        function getPdfUrl(id) {
            return `https://drive.google.com/uc?export=download&id=${PDF_DATA[id]}`;
        }

        // --- Rendering ---
        function render() {
            const content = document.getElementById('content');
            const navItems = document.querySelectorAll('.nav-item');
            
            // Update Navigation UI
            navItems.forEach(item => {
                if (item.id === `nav-${currentTab}`) {
                    item.classList.add('active-tab');
                    item.classList.remove('text-slate-400');
                } else {
                    item.classList.remove('active-tab');
                    item.classList.add('text-slate-400');
                }
            });

            // Render Content
            content.innerHTML = '';
            switch(currentTab) {
                case 'home': renderHome(); break;
                case 'theory': renderTheory(); break;
                case 'videos': renderVideos(); break;
                case 'standards': renderStandards(); break;
            }
            
            // Re-initialize Lucide icons
            lucide.createIcons();
        }

        function renderHome() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="fade-in">
                    <div class="py-6">
                        <h1 class="text-4xl font-black italic tracking-tighter text-primary leading-tight mb-2">
                            READY FOR<br><span class="text-accent underline decoration-4 underline-offset-4">RESCUE?</span>
                        </h1>
                        <p class="text-slate-400 text-sm font-semibold tracking-tight">수성구조사 국가자격 완벽 대비를 위한 공식 아카이브.</p>
                    </div>

                    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl shadow-slate-200 border border-slate-50 mb-8 mt-4 relative overflow-hidden">
                        <div class="absolute -right-4 -top-4 w-24 h-24 bg-primary/5 rounded-full"></div>
                        <div class="flex items-center gap-2 mb-4">
                            <div class="w-1.5 h-1.5 bg-accent rounded-full animate-pulse"></div>
                            <span class="text-[10px] font-bold text-accent tracking-[0.2em] uppercase">Latest Update</span>
                        </div>
                        <h2 class="text-2xl font-black mb-6 text-slate-800 leading-tight">문제은행 500문항<br>통합본 배포 중</h2>
                        <a href="${getPdfUrl('unified')}" target="_blank" class="inline-flex items-center gap-2 bg-primary text-white px-8 py-4 rounded-2xl text-xs font-black btn-active shadow-lg shadow-primary/20">
                            <i data-lucide="download" class="w-4 h-4"></i> 통합 PDF 받기
                        </a>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div onclick="navigate('theory')" class="bg-blue-50 p-6 rounded-[2rem] border border-blue-100 btn-active cursor-pointer">
                            <i data-lucide="book-open" class="w-6 h-6 text-primary mb-3"></i>
                            <h3 class="font-bold text-sm text-slate-800">이론 교육</h3>
                            <p class="text-[10px] text-slate-500 font-medium leading-tight mt-1">장별 핵심 요약 및 PDF 문제은행</p>
                        </div>
                        <div onclick="navigate('videos')" class="bg-orange-50 p-6 rounded-[2rem] border border-orange-100 btn-active cursor-pointer">
                            <i data-lucide="play-circle" class="w-6 h-6 text-accent mb-3"></i>
                            <h3 class="font-bold text-sm text-slate-800">실기 영상</h3>
                            <p class="text-[10px] text-slate-500 font-medium leading-tight mt-1">영법부터 구조 기술까지 실기 완벽 가이드</p>
                        </div>
                    </div>

                    <a href="https://www.instagram.com/swimology__" target="_blank" class="flex items-center justify-between p-8 rounded-[2.5rem] bg-gradient-to-br from-purple-600 to-orange-500 text-white shadow-xl btn-active mb-12">
                        <div>
                            <p class="text-[9px] font-bold opacity-80 mb-1 tracking-widest uppercase">Follow Instagram</p>
                            <h3 class="text-2xl font-black italic tracking-tighter">@swimology__</h3>
                        </div>
                        <i data-lucide="instagram" class="w-8 h-8"></i>
                    </a>

                    <footer class="py-10 flex flex-col items-center border-t border-slate-100 gap-4 mt-4">
                        <div class="flex gap-8 opacity-30">
                            <a href="https://youtube.com/@swimology_ist?si=zw1TEuQ0sBRiQPGI" target="_blank"><i data-lucide="youtube" class="w-6 h-6"></i></a>
                            <a href="https://www.instagram.com/swimology__" target="_blank"><i data-lucide="instagram" class="w-6 h-6"></i></a>
                        </div>
                        <p class="text-[9px] font-black text-slate-300 tracking-[0.3em] uppercase">© 2024 SWIMOLOGY DIGITAL ARCHIVE</p>
                    </footer>
                </div>
            `;
        }

        function renderTheory() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="fade-in">
                    <div class="py-6 mb-4 text-center">
                        <h2 class="text-2xl font-black italic tracking-tighter mb-2">THEORY EDU</h2>
                        <p class="text-slate-400 text-xs font-bold text-center">7개 장별 핵심 문제은행 가이드북</p>
                    </div>
                    <div class="space-y-3.5">
                        ${CHAPTERS.map(ch => `
                            <a href="${getPdfUrl(ch.id)}" target="_blank" class="flex items-center justify-between ${ch.color} p-5 rounded-[2rem] border border-slate-100 btn-active shadow-sm">
                                <div class="flex items-center gap-4">
                                    <div class="w-11 h-11 rounded-[1rem] bg-white flex items-center justify-center text-slate-800 shadow-sm">
                                        <i data-lucide="${ch.icon}" class="w-5 h-5"></i>
                                    </div>
                                    <div>
                                        <p class="text-[10px] font-black text-slate-400 mb-0.5 tracking-wider uppercase">Chapter 0${ch.id}</p>
                                        <h4 class="text-[14px] font-black text-slate-800">${ch.title}</h4>
                                    </div>
                                </div>
                                <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300"></i>
                            </a>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderVideos() {
            const content = document.getElementById('content');
            const categories = VIDEO_DATA.map(v => v.cat);
            const currentItems = VIDEO_DATA.find(v => v.cat === currentVideoCat).items;

            content.innerHTML = `
                <div class="fade-in">
                    <div class="py-6 mb-4 text-center">
                        <h2 class="text-2xl font-black italic tracking-tighter mb-2">PRACTICAL VIDEOS</h2>
                        <p class="text-slate-400 text-xs font-bold">실기 종목별 필수 시청 가이드</p>
                    </div>
                    
                    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-6 sticky top-[52px] bg-slate-50/80 backdrop-blur-md z-40">
                        ${categories.map(cat => `
                            <button onclick="setVideoCat('${cat}')" class="whitespace-nowrap px-6 py-3 rounded-full text-[11px] font-black uppercase tracking-wider transition-all ${currentVideoCat === cat ? 'bg-primary text-white shadow-lg' : 'bg-white text-slate-400 border border-slate-100'}">
                                ${cat}
                            </button>
                        `).join('')}
                    </div>

                    <div class="space-y-12 mt-6">
                        ${currentItems.map(item => `
                            <div class="fade-in">
                                <div class="flex items-center justify-between mb-4 px-1">
                                    <h3 class="text-xl font-black text-slate-900 leading-none italic underline decoration-primary decoration-4 underline-offset-8 decoration-primary/20">${item.title}</h3>
                                    <a href="${item.direct}" target="_blank" class="text-[10px] font-black text-primary bg-primary/5 px-3 py-1.5 rounded-full flex items-center gap-1.5">
                                        <i data-lucide="external-link" class="w-3 h-3"></i> CHANNEL
                                    </a>
                                </div>
                                <div class="aspect-video rounded-[2.5rem] overflow-hidden bg-slate-200 shadow-2xl relative border-4 border-white group">
                                    <iframe src="https://www.youtube.com/embed/${item.id}?modestbranding=1&rel=0" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
                                </div>
                                <div class="mt-4 px-2">
                                    <button onclick="window.open('${item.direct}')" class="w-full py-4 bg-slate-900 text-white rounded-2xl text-[11px] font-black uppercase tracking-[0.2em] flex items-center justify-center gap-2 btn-active">
                                        <i data-lucide="play" class="w-3 h-3 fill-white"></i> YouTube 앱에서 시청하기
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderStandards() {
            const content = document.getElementById('content');
            const rules = [
                { t: '합격 기준', d: '전 종목 총점 100점 만점에 60점 이상 획득 시 합격입니다. (단, 한 과목이라도 0점 처리 시 불합격)' },
                { t: '주요 실격 사유', d: '영법 완주 실패, 바닥 딛기, 요구조자 침수 방치, 장비 착용 미숙 등이 있습니다.' },
                { t: '종목별 시간', d: '잠영 25m 완주 + 운반 25m (1분 30초 내 완수 등 급수별 차등 적용)' },
                { t: '응구처치 평가', d: '준비물 지참 및 실습 과정의 정확도(압박 깊이, 속도 등)를 종합 평가합니다.' }
            ];

            content.innerHTML = `
                <div class="fade-in">
                    <div class="py-6 mb-6 text-center">
                        <h2 class="text-2xl font-black italic tracking-tighter mb-2">TEST STANDARDS</h2>
                        <p class="text-slate-400 text-xs font-bold">수상구조사 실기 평가 합격 기준 및 유의사항</p>
                    </div>
                    
                    <div class="space-y-4">
                        ${rules.map((r, i) => `
                            <div class="bg-white p-7 rounded-[2.5rem] border border-slate-100 flex gap-5 shadow-sm">
                                <div class="w-12 h-12 rounded-2xl bg-primary/5 flex items-center justify-center text-primary font-black italic text-xl shrink-0">
                                    ${i+1}
                                </div>
                                <div class="flex flex-col justify-center">
                                    <h4 class="font-black text-slate-900 mb-1 leading-tight text-[15px] uppercase italic">${r.t}</h4>
                                    <p class="text-xs text-slate-500 leading-relaxed font-medium">${r.d}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="mt-12 bg-primary rounded-[3rem] p-12 text-center shadow-2xl shadow-primary/30 relative overflow-hidden">
                        <div class="absolute -left-10 -bottom-10 w-40 h-40 bg-white/5 rounded-full"></div>
                        <i data-lucide="external-link" class="w-12 h-12 text-white/20 mx-auto mb-6"></i>
                        <h3 class="text-white text-2xl font-black mb-8 italic tracking-tighter leading-tight uppercase">Official Portal</h3>
                        <p class="text-blue-100/60 text-xs mb-10 leading-relaxed font-medium">자세한 일정 및 시험 접수는 해양경찰청<br>수상구조사 종합정보시스템을 확인하세요.</p>
                        <a href="https://imsm.kcg.go.kr/CLMS/" target="_blank" class="inline-block bg-accent text-white px-10 py-5 rounded-2xl text-[11px] font-black tracking-widest shadow-lg shadow-black/10 btn-active uppercase">
                            홈페이지 바로가기
                        </a>
                    </div>
                </div>
            `;
        }

        // --- Init ---
        window.onload = () => {
            render();
        };

    </script>
</body>
</html>
