<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swimology 실기 영상</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #007bff; font-size: 20px; text-align: center; }
        .video-card { margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .video-title { font-weight: bold; margin-bottom: 10px; display: block; }
        iframe { width: 100%; height: 200px; border-radius: 8px; border: none; }
        .btn { display: inline-block; margin-top: 10px; padding: 10px 15px; background: #ff0000; color: white; text-decoration: none; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>@swimology__ 실기 가이드</h1>
        <p style="text-align:center; font-size:12px; color:#666;">영상이 안 나오면 하단 빨간 버튼을 누르세요.</p>

        <div class="video-card">
            <span class="video-title">1. 잠영</span>
            <iframe src="https://www.youtube.com/embed/uhd5lBfGtIQ" allowfullscreen></iframe>
            <a href="https://youtu.be/T8-JDU3asO4" target="_blank" class="btn">유튜브 앱에서 직접 보기</a>
        </div>

        <div class="video-card">
            <span class="video-title">2. 성인 심폐소생술</span>
            <iframe src="https://www.youtube.com/embed/77YoQFffKcs" allowfullscreen></iframe>
            <a href="https://youtu.be/erdZSV6G5X4" target="_blank" class="btn">유튜브 앱에서 직접 보기</a>
        </div>
        
        <p style="text-align:center; color:#888;">나머지 영상들도 이와 같은 방식으로 업데이트될 예정입니다.</p>
    </div>
</body>
</html>
