            --primary: #0A1F44;

        body {
            font-family: 'Noto Sans KR', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

            color: #0f172a;
            user-select: none;

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .standard-table td {

            padding: 16px 8px; 
            text-align: center; 
            border-bottom: 1px solid #f1f5f9; 
            color: #1e293b; 
            font-weight: 600; 
        }
        .standard-table tr:last-child td { border-bottom: none; }
    </style>

                { id: 'DOUWQ4dY93I', title: '요구조자 운반 (배영)', direct: 'https://youtu.be/DOUWQ4dY93I', hideYoutubeBtn: true },
                { id: 'H8MM0yGnhYU', title: '요구조자 운반 (횡영)', direct: 'https://youtu.be/H8MM0yGnhYU', hideYoutubeBtn: true },
                { id: 'DTeXB2ZigRQ', title: '구명동의 착용법', direct: 'https://youtu.be/14qhWxAkNbA', hideYoutubeBtn: true },
                { id: '4Fj9SPeKAfw', title: '퇴선방법', direct: 'https://youtu.be/CJ7MgH2XrJM', hideYoutubeBtn: true },
                { id: 'Djgx6m5spYM', title: '자동팽창식 구명뗏목 사용법', direct: 'https://youtu.be/JuZTSdfZA64', hideYoutubeBtn: true },
                { id: '6PIg_D5dC5A', title: '스파인보드 구조', direct: 'https://youtu.be/6PIg_D5dC5A', hideYoutubeBtn: true }
            ]},
            { cat: '로프매듭법', items: [
                { id: '5yey1aJ5BtA', title: '로프매듭법 1', direct: 'https://youtu.be/5yey1aJ5BtA', hideYoutubeBtn: true },
                { id: 'Mlf2w0ZkAXM', title: '로프매듭법 2', direct: 'https://youtu.be/Mlf2w0ZkAXM', hideYoutubeBtn: true }
            ]},
            { cat: '응급처치', items: [
                { id: '77YoQFffKcs', title: '성인 CPR', direct: 'https://youtu.be/erdZSV6G5X4' },
                { id: '1-tKW_5bdVs', title: '영아 CPR', direct: 'https://youtu.be/SaKtSuf_JqI' }
            ]}
        ];

        // --- Quiz Application States ---
        let activeQuizUnit = null;
        let activeSubMenuChapter = null;
        let activeQuizQuestions = [];
        let currentQuestionIndex = 0;
        let isQuestionAnswered = false;
        let selectedOptionIndex = null;
        let tempSelectedOptionIndex = null;
        let quizScore = 0;
        let quizMode = 'random10'; // 'random10' or 'sequential'

        const UNIT_NAMES = {
            1: '1단원. 수상구조사의 자세',
            2: '2단원. 조난사고의 이해',
            3: '3단원. 관련법령',
            4: '4단원. 응급처치',
            5: '5단원. 구조기술',
            6: '6단원. 지도자의 자질',
            7: '7단원. 생존수영'
        };

        const OPTION_LABELS = ['①', '②', '③', '④'];

        function getDisplayedQuestionNumber(index, q) {
            const offsets = {
                1: 1,      // 1단원. 수상구조사의 자세
                2: 21,     // 2단원. 조난사고의 이해
                3: 111,    // 3단원. 관련법령
                4: 151,    // 4단원. 응급처치 (151번 ~ 250번)
                5: 251,    // 5단원. 구조기술 (251번 ~ 375번)
                6: 376,    // 6단원. 지도자의 자질 (376번 ~ 425번)
                7: 426     // 7단원. 생존수영 (426번 ~)
            };
            const baseOffset = offsets[activeQuizUnit] || 1;
            
            if (quizMode === 'random10') {
                return index + 1;
            }
            // For sequential mode, return the real sequential index offset
            const questionIndex = (q && typeof q.originalIndex === 'number') ? q.originalIndex : index;
            return baseOffset + questionIndex;
        }

        function cleanQuestionText(text) {
            if (!text) return "";
            let cleaned = text.trim();
            // Remove any leading Q1., Q123. or similar prefixes
            cleaned = cleaned.replace(/^[Qq]\d+\s*\.?\s*/g, '');
            // Prevent duplicate numbers like "151. 151. 지문"
            const match = cleaned.match(/^(\d+)\s*\.\s*(\1\s*\.\s*)+/);
            if (match) {
                cleaned = cleaned.replace(/^(\d+)\s*\.\s*(\1\s*\.\s*)+/, '$1. ');
            }
            return cleaned;
        }

        function parseOption(optionText, index) {
            if (!optionText) return { prefix: OPTION_LABELS[index], text: "" };
            let cleaned = optionText.trim();
            
            // ① ~ ⑤ 기호 또는 1. ~ 4. 기호 등으로 시작하는 패턴 매칭
            const prefixRegex = /^([①②③④⑤①-⑤\d](\s*[.)])?)\s*(.*)/;
            const match = cleaned.match(prefixRegex);
            if (match && match[1]) {
                const prefix = match[1].trim();
                const text = match[3].trim();
                return { prefix, text };
            }
            return { prefix: OPTION_LABELS[index], text: cleaned };
        }

        // --- Core Quiz Logic ---
        function startQuiz(unitId, mode = 'random10') {
            activeQuizUnit = unitId;
            quizMode = mode;
            
            const originalQuestions = QUIZ_DATA[unitId] || [];
            let processedQuestions = originalQuestions.map((q, idx) => ({
                question: q.question,
                options: [...q.options],
                answer: q.answer,
                explanation: q.explanation,
                originalIndex: idx
            }));
            
            if (quizMode === 'random10') {
                // Fisher-Yates Shuffle
                for (let i = processedQuestions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    const temp = processedQuestions[i];
                    processedQuestions[i] = processedQuestions[j];
                    processedQuestions[j] = temp;
                }
                activeQuizQuestions = processedQuestions.slice(0, 10);
            } else {
                activeQuizQuestions = processedQuestions;
            }
            
            currentQuestionIndex = 0;
            isQuestionAnswered = false;
            selectedOptionIndex = null;
            tempSelectedOptionIndex = null;
            quizScore = 0;
            render();
            window.scrollTo(0, 0);
        }

        function handleAnswerClick(optionIndex) {
            if (isQuestionAnswered) return;
            tempSelectedOptionIndex = optionIndex;
            render();
        }

        function submitAnswer() {
            if (isQuestionAnswered || tempSelectedOptionIndex === null) return;
            isQuestionAnswered = true;
            selectedOptionIndex = tempSelectedOptionIndex;
            
            const currentUnitQuestions = activeQuizQuestions;
            const currentQuestion = currentUnitQuestions[currentQuestionIndex];
            
            if (selectedOptionIndex === currentQuestion.answer) {
                quizScore += 1;
            }
            
            render();
        }

        function nextQuizQuestion() {
            const currentUnitQuestions = activeQuizQuestions;
            if (currentQuestionIndex + 1 < currentUnitQuestions.length) {
                currentQuestionIndex += 1;
                isQuestionAnswered = false;
                selectedOptionIndex = null;
                tempSelectedOptionIndex = null;
                render();
                window.scrollTo(0, 0);
            } else {
                currentQuestionIndex = currentUnitQuestions.length; // triggers result display
                render();
                window.scrollTo(0, 0);
            }
        }

        // Standard helpers
        function resetQuiz() {
            const originalQuestions = QUIZ_DATA[activeQuizUnit] || [];
            let processedQuestions = originalQuestions.map((q, idx) => ({
                question: q.question,
                options: [...q.options],
                answer: q.answer,
                explanation: q.explanation,
                originalIndex: idx
            }));
            
            if (quizMode === 'random10') {
                for (let i = processedQuestions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    const temp = processedQuestions[i];
                    processedQuestions[i] = processedQuestions[j];
                    processedQuestions[j] = temp;
                }
                activeQuizQuestions = processedQuestions.slice(0, 10);
            } else {
                activeQuizQuestions = processedQuestions;
            }
            
            currentQuestionIndex = 0;
            isQuestionAnswered = false;
            selectedOptionIndex = null;
            tempSelectedOptionIndex = null;
            quizScore = 0;
            render();
            window.scrollTo(0, 0);
        }

        function exitQuiz() {
            if (activeQuizUnit !== null) {
                activeSubMenuChapter = activeQuizUnit;
            }
            activeQuizUnit = null;
            activeQuizQuestions = [];
            currentQuestionIndex = 0;
            isQuestionAnswered = false;
            selectedOptionIndex = null;
            tempSelectedOptionIndex = null;
            quizScore = 0;
            render();
            window.scrollTo(0, 0);
        }

        function renderQuizPlay(content) {
            const currentUnitQuestions = activeQuizQuestions;
            const totalQuestions = currentUnitQuestions.length;
            
            // Render Quiz Result Screen if complete
            if (currentQuestionIndex >= totalQuestions) {
                const percentage = Math.round((quizScore / totalQuestions) * 100);
                const isPassed = percentage >= 60;
                
                content.innerHTML = `
                    <div class="fade-in space-y-6">
                        <div class="text-center py-6">
                            <div class="w-20 h-20 rounded-full ${isPassed ? 'bg-green-500/10 text-green-500' : 'bg-amber-500/10 text-amber-500'} flex items-center justify-center mx-auto mb-4">
                                <i data-lucide="${isPassed ? 'check-check' : 'alert-circle'}" class="w-10 h-10"></i>
                            </div>
                            <h2 class="text-2xl font-black text-slate-800 tracking-tight">모의고사 완료!</h2>
                            <p class="text-slate-400 text-xs font-semibold mt-1">수상구조사 단원별 실전 평가</p>
                        </div>
                        
                        <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-xl p-8 text-center space-y-6">
                            <div>
                                <p class="text-[11px] font-extrabold tracking-[0.2em] text-accent mb-1.5 uppercase">FINAL EVALUATION REPORT</p>
                                <h3 class="text-[13px] font-black text-slate-500">단원: ${UNIT_NAMES[activeQuizUnit]}</h3>
                            </div>
                            
                            <div class="py-6 bg-slate-50 rounded-3xl border border-slate-100/50 inline-block w-full">
                                <div class="text-5xl font-black text-primary italic leading-none">${percentage}<span class="text-2xl not-italic font-bold text-slate-400 ml-1">점</span></div>
                                <div class="text-[11px] font-bold text-slate-400 mt-2 tracking-tight">총 ${totalQuestions}문제 중 <span class="text-primary font-extrabold">${quizScore}문제</span> 정답</div>
                            </div>
                            
                            <div class="px-2">
                                <p class="text-xs text-slate-500 font-bold leading-relaxed">
                                    ${isPassed ? 
                                        '축하합니다! 합격 기준인 60점 이상을 획득하였습니다. 실전에서도 이 기세를 이어가 좋은 결과를 거두시길 바랍니다.' : 
                                        '아쉽게도 합격 기준인 60점에 도달하지 못했습니다. 오답 핵심 해설을 자세히 확인하여 부족한 부분을 보완해 보세요.'
                                    }
                                </p>
                            </div>
                        </div>
                        
                        <div class="space-y-3 pt-4">
                            <button onclick="resetQuiz()" class="w-full bg-primary text-white font-bold py-4.5 rounded-2xl btn-active transition-all shadow-md shadow-primary/10 flex items-center justify-center gap-2.5 cursor-pointer text-sm">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                                다시 도전하기
                            </button>
                            <button onclick="exitQuiz()" class="w-full bg-white border border-slate-200 text-slate-500 font-bold py-4.5 rounded-2xl btn-active transition-all shadow-sm flex items-center justify-center gap-2.5 cursor-pointer text-sm">
                                <i data-lucide="home" class="w-4 h-4"></i>
                                단원 선택으로 가기
                            </button>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                return;
            }
            
            const question = currentUnitQuestions[currentQuestionIndex];
            
            content.innerHTML = `
                <div class="fade-in space-y-6">
                    <!-- Quiz Stop Header -->
                    <div class="flex items-center justify-between px-1 border-b border-slate-100 pb-3">
                        <button onclick="exitQuiz()" class="flex items-center gap-1.5 text-slate-400 hover:text-slate-800 transition-colors font-bold text-xs cursor-pointer">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i>
                            <span>퀴즈 중단</span>
                        </button>
                        <span class="text-xs font-black text-slate-400 bg-slate-100 px-3 py-1 rounded-full">${currentQuestionIndex + 1} / ${totalQuestions}</span>
                    </div>
 
                    <!-- Progress Bar -->
                    <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-accent transition-all duration-300" style="width: ${((currentQuestionIndex) / totalQuestions) * 100}%"></div>
                    </div>
 
                    <!-- Question Card -->
                    <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-6">
                        <h3 class="text-[14.5px] font-black text-slate-800 leading-relaxed tracking-tight">
                            ${cleanQuestionText(question.question)}
                        </h3>
                    </div>
                    
                    <!-- Option Lists -->
                    <div class="space-y-2.5">
                        ${question.options.map((opt, i) => {
                            let styleClass = "bg-white border-slate-100 text-slate-700 hover:bg-slate-50 hover:border-slate-300 pointer-events-auto cursor-pointer";
                            let iconHTML = "";
                            
                            if (isQuestionAnswered) {
                                styleClass = "border-slate-100 text-slate-400 opacity-60 pointer-events-none cursor-default bg-slate-50/30";
                                
                                if (i === question.answer) {
                                    styleClass = "bg-green-500/10 border-green-400 text-green-700 font-extrabold pointer-events-none cursor-default shadow-sm shadow-green-500/5";
                                    iconHTML = `<i data-lucide="check-circle" class="w-4.5 h-4.5 text-green-500 shrink-0"></i>`;
                                } else if (i === selectedOptionIndex) {
                                    styleClass = "bg-red-500/10 border-red-300 text-red-700 font-extrabold pointer-events-none cursor-default shadow-sm shadow-red-500/5";
                                    iconHTML = `<i data-lucide="alert-triangle" class="w-4.5 h-4.5 text-red-500 shrink-0"></i>`;
                                }
                            } else {
                                if (i === tempSelectedOptionIndex) {
                                    styleClass = "bg-primary/5 border-primary text-primary font-bold shadow-sm shadow-primary/5 scale-[1.01] pointer-events-auto cursor-pointer";
                                } else {

                `;

            knotTestState.timerInterval = setInterval(() => {
                knotTestState.timerVal--;
                
                const display = document.getElementById('knot-timer-display');
                const progress = document.getElementById('knot-timer-progress');
                
                if (display) {
                    display.innerText = `${knotTestState.timerVal}초 남음`;
                }
                if (progress) {
                    const percentage = (knotTestState.timerVal / 45) * 100;
                    progress.style.width = `${percentage}%`;
                    if (knotTestState.timerVal <= 10) {
                        progress.classList.remove('bg-accent');
                        progress.classList.add('bg-red-500');
                        if (display) {
                            display.classList.remove('text-slate-700');
                            display.classList.add('text-red-500', 'font-black');
                        }
                    }
                }
                
                if (knotTestState.timerVal <= 0) {
                    cleanupKnotTest();
                    completeKnotStep(false);
                }
            }, 1000);
        }

            knotTestState.results.push({
                name: currentKnot.name,
                category: currentKnot.category,
                success: isSuccess,
                timeSpent: timeSpent
            });
            
            if (knotTestState.currentStep < 5) {

                knotTestState.timerVal = 45;

                                                </div>
                                                <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                                                    <div id="knot-timer-progress" class="h-full bg-accent transition-all duration-1000" style="width: ${knotTestState.stepActive ? (knotTestState.timerVal / 45) * 100 : 100}%"></div>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Action buttons -->
                                        <div id="knot-action-area" class="space-y-3">
                                            ${!knotTestState.stepActive ? `
                                                <button onclick="startKnotTimer()" class="w-full bg-accent hover:bg-accent/95 text-white py-4.5 rounded-2xl font-bold btn-active shadow-lg shadow-accent/10 flex items-center justify-center gap-2 cursor-pointer text-sm">
                                                    <i data-lucide="timer" class="w-4 h-4"></i>
                                                    ⏱️ 시작
                                                </button>
                                                <button onclick="abortKnotTest()" class="w-full bg-white border border-slate-200 text-slate-400 hover:text-slate-600 py-3 rounded-2xl font-bold text-xs btn-active flex items-center justify-center gap-1.5 cursor-pointer">
                                                    테스트 중단하기
                                                </button>
                                            ` : `
                                                <button onclick="completeKnotStep(true)" class="w-full bg-green-500 hover:bg-green-600 text-white py-4.5 rounded-2xl font-bold btn-active shadow-lg shadow-green-500/15 flex items-center justify-center gap-2 cursor-pointer text-sm font-black">
                                                    ✅ 완료
                                                </button>
                                            `}
                                        </div>
                                    `;
                                })()}
                            </div>
                        `}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // --- Init ---
        window.onload = () => {
            render();
        };

    </script>
</body>
</html>
